<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MES系统 - 制造执行系统</title>
  <link rel="stylesheet" href="css/common.css">
  <style>
    .app-layout { display: flex; min-height: 100vh; }
    /* ===== 方案G：左侧竖排一级目录栏 ===== */
    .sidebar {
      width: 260px;
      background: linear-gradient(180deg, #1e3a5f 0%, #0f1b2d 100%);
      color: rgba(255,255,255,0.7);
      flex-shrink: 0; display: flex; flex-direction: column;
      position: fixed; left: 0; top: 0; bottom: 0; z-index: 100;
      transition: transform .3s ease; overflow: hidden;
      border-right: 1px solid rgba(255,255,255,0.06);
    }
    .sidebar-header {
      padding: 16px 20px; display: flex; align-items: center; gap: 10px;
      border-bottom: 1px solid rgba(255,255,255,0.08); position: relative; z-index: 1;
    }
    .sidebar-logo {
      width: 36px; height: 36px; background: linear-gradient(135deg, #1890ff, #096dd9);
      border-radius: 8px; display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 700; letter-spacing: 1px; color: #fff;
    }
    .sidebar-title { font-size: 15px; font-weight: 700; color: #fff; letter-spacing: 1px; }
    .sidebar-subtitle { font-size: 10px; color: rgba(255,255,255,0.4); letter-spacing: 2px; }
    .sidebar-nav { flex: 1; overflow-y: auto; padding: 8px 0; position: relative; z-index: 1; }
    .sidebar-nav::-webkit-scrollbar { width: 4px; }
    .sidebar-nav::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }

    /* 一级菜单项 */
    .g-left-item {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 20px; font-size: 14px; color: #fff;
      cursor: pointer; transition: all .15s; position: relative;
      margin: 0 8px; border-radius: 4px;
    }
    .g-left-item:hover { color: #fff; background: rgba(24,144,255,0.15); }
    .g-left-item.active {
      color: #fff; background: rgba(24,144,255,0.25); font-weight: 500;
    }
    .g-left-item.active::after {
      content: ''; position: absolute; right: -8px; top: 50%; transform: translateY(-50%);
      width: 0; height: 0;
      border-top: 6px solid transparent;
      border-bottom: 6px solid transparent;
      border-right: 6px solid #f6f8fb;
    }
    .g-left-icon { font-size: 16px; width: 20px; text-align: center; }

    /* hover 展开的全宽面板 */
    .g-hover-panel {
      position: fixed; left: 260px; top: 0;
      width: 0; max-height: 100vh; overflow: hidden;
      background: #f6f8fb; border-left: 1px solid #e8e8e8;
      transition: width .2s ease; z-index: 95;
      box-shadow: 4px 0 16px rgba(0,0,0,0.06);
    }
    .g-hover-panel.open { overflow-y: auto; }
    .g-hover-panel-inner {
      padding: 24px 28px;
    }
    .g-hover-panel-inner h3 {
      font-size: 16px; font-weight: 700; color: #262626;
      margin-bottom: 20px; padding-bottom: 12px;
      border-bottom: 2px solid #1890ff;
    }
    .g-hover-grid {
      display: grid;
      gap: 0 32px;
    }
    .g-hover-col { margin-bottom: 20px; }
    .g-hover-col-title {
      font-size: 13px; font-weight: 700; color: #262626;
      padding: 8px 0; margin-bottom: 4px;
      border-bottom: 1px solid #e8e8e8;
      cursor: default; user-select: none;
    }
    .g-hover-link {
      display: block; padding: 7px 0;
      font-size: 13px; color: rgba(0,0,0,0.65);
      cursor: pointer; transition: color .12s;
      text-decoration: none;
    }
    .g-hover-link:hover { color: #1890ff; }
    .g-hover-link.active { color: #1890ff; font-weight: 500; }

    .sidebar-footer { padding: 12px; border-top: 1px solid rgba(255,255,255,0.08); position: relative; z-index: 1; }
    .user-card {
      display: flex; align-items: center; padding: 10px; background: rgba(255,255,255,0.06);
      border-radius: 8px; gap: 10px;
    }
    .user-avatar {
      width: 36px; height: 36px; background: linear-gradient(135deg, #1890ff, #096dd9);
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; color: #fff;
    }
    .user-name { font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.9); }
    .user-role { font-size: 11px; color: rgba(255,255,255,0.5); }
    .main-area { flex: 1; margin-left: 260px; display: flex; flex-direction: column; min-height: 100vh; transition: margin-left .3s; }
    .topbar {
      background: white; box-shadow: var(--shadow); padding: 0 24px; height: 56px;
      display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50;
    }
    .topbar-left { display: flex; align-items: center; gap: 12px; }
    .menu-toggle { display: none; width: 36px; height: 36px; border: none; background: var(--bg); border-radius: var(--radius-sm); font-size: 18px; cursor: pointer; }
    .topbar-title { font-size: 17px; font-weight: 700; }
    .topbar-right { display: flex; align-items: center; gap: 4px; }
    .topbar-btn-group { position: relative; }
    .topbar-btn {
      width: 36px; height: 36px; border: 1px solid transparent; background: transparent;
      border-radius: var(--radius-sm); font-size: 16px; color: var(--text-secondary);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      position: relative; transition: all .2s ease; user-select: none;
      outline: none; flex-shrink: 0;
    }
    .topbar-btn:hover { background: var(--bg); color: var(--text); border-color: var(--border); }
    .topbar-btn:active { background: var(--border); transform: scale(.94); }
    .topbar-btn:focus-visible {
      box-shadow: 0 0 0 3px rgba(59,130,246,.25); border-color: var(--primary-lighter);
    }
    .topbar-btn.active, .topbar-btn[aria-expanded="true"] {
      background: rgba(59,130,246,.08); color: var(--primary-lighter); border-color: rgba(59,130,246,.3);
    }
    .topbar-btn:disabled {
      opacity: .35; cursor: not-allowed; pointer-events: none;
    }
    .topbar-btn-icon { display: block; flex-shrink: 0; }

    /* Badge */
    .topbar-badge {
      position: absolute; top: -4px; right: -6px;
      background: var(--danger); color: #fff;
      font-size: 10px; font-weight: 700; line-height: 1;
      min-width: 18px; height: 18px; padding: 0 5px; border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 0 2px white;
      animation: badgePop .3s cubic-bezier(.34,1.56,.64,1);
    }
    .topbar-badge.hidden { display: none; }
    @keyframes badgePop {
      0% { transform: scale(.5); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    /* User Button */
    .topbar-user-btn {
      width: auto; height: 36px; padding: 0 6px 0 10px; gap: 6px;
      display: flex; align-items: center; background: transparent; border-radius: 20px;
    }
    .topbar-user-btn:hover { background: var(--bg); border-color: var(--border); }
    .topbar-avatar {
      width: 28px; height: 28px; border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: white; font-size: 12px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .topbar-username { font-size: 13px; font-weight: 600; color: var(--text); white-space: nowrap; }
    .topbar-user-arrow { transition: transform .2s ease; color: var(--text-secondary); flex-shrink: 0; }
    .topbar-btn[aria-expanded="true"] .topbar-user-arrow { transform: rotate(180deg); }

    /* Dropdown Panel */
    .topbar-dropdown {
      position: absolute; top: calc(100% + 8px); right: 0;
      background: white; border-radius: var(--radius); box-shadow: var(--shadow-lg), 0 0 0 1px rgba(0,0,0,.05);
      min-width: 220px; z-index: 200; opacity: 0; visibility: hidden;
      transform: translateY(-6px) scale(.96);
      transition: opacity .2s ease, transform .2s ease, visibility .2s ease;
      pointer-events: none;
    }
    .topbar-dropdown.show {
      opacity: 1; visibility: visible; transform: translateY(0) scale(1); pointer-events: auto;
    }
    .topbar-dropdown::before {
      content: ''; position: absolute; top: -6px; right: 14px;
      width: 12px; height: 12px; background: white; border-radius: 2px;
      transform: rotate(45deg);
      box-shadow: -1px -1px 0 rgba(0,0,0,.04);
    }

    /* Notification Panel */
    .notify-panel { width: 380px; max-height: 480px; display: flex; flex-direction: column; }
    .notify-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 18px; border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .notify-title { font-size: 15px; font-weight: 700; color: var(--text); }
    .notify-actions { display: flex; gap: 4px; }
    .notify-action-btn {
      padding: 4px 12px; border: 1px solid var(--border); background: white;
      border-radius: var(--radius-sm); font-size: 12px; font-weight: 500;
      color: var(--text-secondary); cursor: pointer; transition: all .15s;
    }
    .notify-action-btn:hover { background: var(--bg); color: var(--text); border-color: var(--text-muted); }
    .notify-list { flex: 1; overflow-y: auto; padding: 4px 0; }
    .notify-list::-webkit-scrollbar { width: 4px; }
    .notify-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .notify-item {
      display: flex; gap: 10px; padding: 12px 18px; cursor: pointer;
      transition: background .15s; border-left: 3px solid transparent;
    }
    .notify-item:hover { background: #f8fafc; }
    .notify-item.unread { background: #f0f7ff; border-left-color: var(--primary-lighter); }
    .notify-item.unread:hover { background: #e6f0fd; }
    .notify-dot {
      width: 8px; height: 8px; border-radius: 50%; background: var(--primary-lighter);
      margin-top: 6px; flex-shrink: 0;
    }
    .notify-dot.read { background: transparent; }
    .notify-body { flex: 1; min-width: 0; }
    .notify-item-title { font-size: 13px; font-weight: 600; color: var(--text); line-height: 1.4; }
    .notify-item-desc { font-size: 12px; color: var(--text-secondary); margin-top: 2px; line-height: 1.3; }
    .notify-item-time { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
    .notify-item-icon {
      width: 32px; height: 32px; border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 14px;
    }
    .notify-item-icon.info  { background: rgba(59,130,246,.1); color: var(--primary-lighter); }
    .notify-item-icon.warn  { background: rgba(245,158,11,.1); color: #d97706; }
    .notify-item-icon.danger{ background: rgba(220,38,38,.1); color: var(--danger); }
    .notify-item-icon.success{ background: rgba(16,185,129,.1); color: var(--success); }
    .notify-empty {
      padding: 40px 20px; text-align: center; color: var(--text-muted); font-size: 13px;
    }
    .notify-footer {
      padding: 10px 18px; border-top: 1px solid var(--border); text-align: center; flex-shrink: 0;
    }
    .notify-viewall {
      font-size: 13px; font-weight: 600; color: var(--primary-lighter); text-decoration: none;
    }
    .notify-viewall:hover { text-decoration: underline; }

    /* Settings / User Menu */
    .dropdown-section { padding: 6px 0; }
    .dropdown-section-label {
      padding: 6px 16px; font-size: 11px; font-weight: 700; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: .6px;
    }
    .dropdown-item {
      display: flex; align-items: center; gap: 10px; padding: 9px 16px;
      font-size: 13px; color: var(--text); cursor: pointer; transition: background .15s;
    }
    .dropdown-item:hover { background: var(--bg); }
    .dropdown-item:active { background: var(--border); }
    .dropdown-shortcut {
      margin-left: auto; font-size: 11px; color: var(--text-muted);
      padding: 2px 6px; background: var(--bg); border-radius: 4px; font-family: monospace;
    }
    .dropdown-item-danger { color: var(--danger); }
    .dropdown-item-danger:hover { background: #fef2f2; }
    .dropdown-divider { height: 1px; background: var(--border); margin: 4px 0; }

    /* User Menu Header */
    .user-menu-header {
      display: flex; align-items: center; gap: 12px; padding: 14px 16px;
    }
    .user-menu-avatar {
      width: 40px; height: 40px; border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: white; font-size: 15px; font-weight: 700;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .user-menu-name { font-size: 14px; font-weight: 700; color: var(--text); }
    .user-menu-role { font-size: 12px; color: var(--text-secondary); margin-top: 1px; }
    .content-area { flex: 1; padding: 20px 24px; max-width: 1500px; width: 100%; }
    .content-area.full-width { max-width: none; padding: 0; }

    /* Homepage */
    .homepage {
      height: calc(100vh - 56px); position: relative; overflow: hidden;
      margin: -20px -24px; width: calc(100% + 48px);
    }
    .homepage-bg-img {
      position: absolute; inset: 0; width: 100%; height: 100%;
      object-fit: cover; object-position: center;
    }
    .homepage::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(15,27,45,0.05) 0%, transparent 25%,
        transparent 75%, rgba(15,27,45,0.12) 100%
      );
      pointer-events: none;
    }

    /* Two panel layout */
    .two-panel { display: flex; flex: 1; height: calc(100vh - 56px); }
    .left-panel {
      width: 300px; background: white; border-right: 1px solid var(--border);
      display: flex; flex-direction: column; flex-shrink: 0;
    }
    .left-panel-header { padding: 14px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .left-panel-title { font-size: 14px; font-weight: 700; }
    .left-panel-body { flex: 1; overflow-y: auto; padding: 6px; }
    .right-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    /* Tree row styles */
    .tree-row { transition: background .15s; }
    .tree-row:hover { background: #f1f5f9; }
    .tree-row-active { background: #eff6ff !important; border-left: 2px solid var(--primary); }

    @media (max-width: 768px) {
      .sidebar {
        transform: translateX(-100%);
        box-shadow: 4px 0 20px rgba(0,0,0,0.3);
      }
      .sidebar.open { transform: translateX(0); }
      .main-area { margin-left: 0; }
      .g-hover-panel { display: none; }
      .g-hover-panel.open { display: block; width: 280px; left: 0; z-index: 90; }
      .sidebar { width: 200px; }
      .g-hover-panel-inner { width: 280px; padding: 20px; }
      .g-hover-grid { grid-template-columns: 1fr; }
      .menu-toggle {
        display: flex; align-items: center; justify-content: center;
        width: 40px; height: 40px; font-size: 20px;
        border-radius: var(--radius-sm); border: 1px solid var(--border);
        background: white; cursor: pointer; transition: all .15s;
        flex-shrink: 0;
      }
      .menu-toggle:hover { background: var(--bg); }
      .menu-toggle:active { background: var(--border); }

      /* 侧边栏遮罩层 */
      .sidebar-overlay {
        display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45);
        z-index: 99; transition: opacity .3s;
      }
      .sidebar-overlay.show { display: block; }

      .two-panel { flex-direction: column; }
      .left-panel { width: 100%; max-height: 40vh; }
      .topbar-username { display: none; }
      .topbar-user-btn { padding: 0 4px; }
      .notify-panel { width: calc(100vw - 32px); right: -80px; }

      /* 顶栏优化 */
      .topbar { padding: 0 12px; height: 52px; }
      .topbar-left { gap: 8px; }
      .topbar-title { font-size: 16px; }
      .content-area { padding: 14px 14px; }
      .content-area.full-width { padding: 0; }
      .homepage {
        height: calc(100vh - 52px);
        margin: -14px -14px;
        width: calc(100% + 28px);
      }
    }
    @media (max-width: 480px) {
      .sidebar { width: 200px; }
      .topbar { padding: 0 10px; height: 48px; }
      .topbar-title { font-size: 15px; max-width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .topbar-btn { width: 34px; height: 34px; }
      .menu-toggle { width: 36px; height: 36px; font-size: 18px; }
      .notify-panel { width: calc(100vw - 16px); right: -120px; }
      .content-area { padding: 10px 10px; }
      .homepage {
        height: calc(100vh - 48px);
        margin: -10px -10px;
        width: calc(100% + 20px);
      }

      /* 通知面板小屏优化 */
      .notify-panel { max-height: 420px; }
      .notify-header { padding: 12px 14px; }
      .notify-item { padding: 10px 14px; }
      .notify-title { font-size: 14px; }

      /* 下拉菜单小屏 */
      .topbar-dropdown { min-width: 180px; }
      .dropdown-item { padding: 10px 14px; font-size: 13px; min-height: 44px; }
      .user-menu-header { padding: 12px 14px; }
      .user-menu-avatar { width: 36px; height: 36px; }
    }
  </style>
</head>
<body>
  <div class="app-layout">
    <!-- 移动端侧边栏遮罩 -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div>
          <div class="sidebar-title">MES系统</div>
          <div class="sidebar-subtitle">制造执行系统</div>
        </div>
      </div>
      <nav class="sidebar-nav" id="sidebarNav"></nav>
      <div class="sidebar-footer">
          <div class="user-card">
            <div class="user-avatar" id="sidebarAvatar">管</div>
            <div>
              <div class="user-name" id="sidebarUsername">管理员</div>
              <div class="user-role" id="sidebarRole">系统管理员</div>
            </div>
          </div>
      </div>
    </aside>

    <!-- 方案G：hover 展开的面板 -->
    <div class="g-hover-panel" id="gHoverPanel" onmouseenter="App.keepGPanelOpen()" onmouseleave="App.closeGPanel()">
      <div class="g-hover-panel-inner" id="gHoverPanelInner"></div>
    </div>
    <main class="main-area">
      <header class="topbar">
        <div class="topbar-left">
          <button class="menu-toggle" id="menuToggle">☰</button>
          <h1 class="topbar-title" id="topbarTitle">首页</h1>
        </div>
        <div class="topbar-right">
          <!-- 通知按钮 -->
          <div class="topbar-btn-group">
            <button class="topbar-btn" id="btnNotify" title="通知" aria-label="通知中心">
              <svg class="topbar-btn-icon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
              </svg>
              <span class="topbar-badge" id="notifyBadge">3</span>
            </button>
            <div class="topbar-dropdown notify-panel" id="notifyPanel">
              <div class="notify-header">
                <span class="notify-title">通知</span>
                <div class="notify-actions">
                  <button class="notify-action-btn" id="notifyReadAll">全部已读</button>
                  <button class="notify-action-btn" id="notifyClear">清空</button>
                </div>
              </div>
              <div class="notify-list" id="notifyList"></div>
              <div class="notify-footer">
                <a class="notify-viewall" href="javascript:void(0)">查看全部通知 →</a>
              </div>
            </div>
          </div>

          <!-- 全屏按钮 -->
          <button class="topbar-btn" id="btnFullscreen" title="全屏" aria-label="切换全屏">
            <svg class="topbar-btn-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="15 3 21 3 21 9"/>
              <polyline points="9 21 3 21 3 15"/>
              <line x1="21" y1="3" x2="14" y2="10"/>
              <line x1="3" y1="21" x2="10" y2="14"/>
            </svg>
          </button>

          <!-- 设置按钮 -->
          <div class="topbar-btn-group">
            <button class="topbar-btn" id="btnSettings" title="设置" aria-label="系统设置">
              <svg class="topbar-btn-icon" viewBox="0 0 24 24" width="19" height="19" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="3"/>
                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
              </svg>
            </button>
            <div class="topbar-dropdown settings-menu" id="settingsMenu">
              <div class="dropdown-section">
                <div class="dropdown-section-label">数据管理</div>
                <div class="dropdown-item" data-action="exportData">

  <script>
    var _errors = [];
    window.onerror = function(msg, url, line, col, error) {
      // 过滤掉跨域脚本错误（无法提供有用信息）
      if (msg === 'Script error.' && !url) return;
      _errors.push({msg:msg,url:url,line:line,col:col,stack:error&&error.stack});
      var el = document.getElementById('contentArea');
      if (el && el.dataset.loaded === '1') {
        // 仅在页面已加载完成后显示错误（避免初始化时误报）
        el.innerHTML =
          '<div style="padding:40px 20px;text-align:center;font-family:monospace;color:#dc2626;">' +
          '<h2 style="margin-bottom:12px;font-size:18px;">运行错误</h2>' +
          _errors.map(function(e) {
            return '<div style="background:#fff1f2;border:1px solid #fecaca;border-radius:8px;padding:14px;margin-bottom:10px;text-align:left;max-width:700px;display:inline-block;font-size:13px;">' +
              '<p><strong>错误信息：</strong>' + e.msg + '</p>' +
              '<p><strong>文件：</strong>' + e.url + '</p>' +
              '<p><strong>行号：</strong>' + e.line + '，列：' + e.col + '</p>' +
              (e.stack ? '<pre style="margin-top:8px;font-size:11px;white-space:pre-wrap;word-break:break-all;">' + e.stack + '</pre>' : '') +
              '</div>';
          }).join('') +
          '<button onclick="_errors=[];location.reload()" style="margin-top:16px;padding:10px 24px;background:#dc2626;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:14px;">🔄 刷新页面清除错误</button>' +
          '</div>';
      }
    };
  </script>
