<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>检验批·基本信息 - 风格2 商务层级表</title>
<link rel="stylesheet" href="ib-demo-base.css">
<style>
  /* 风格2：单张严谨表格，工序主行 + 可展开特性子行 */
  table.t2 { width: 100%; border-collapse: collapse; font-size: 12.5px; }
  table.t2 thead th { text-align: left; color: #6b7280; font-weight: 600; font-size: 11.5px; letter-spacing: .4px; background: #fafbfc; border-bottom: 1px solid #e3e6ea; padding: 9px 12px; }
  table.t2 td { padding: 9px 12px; border-bottom: 1px solid #f1f2f4; color: #374151; vertical-align: top; }
  table.t2 .op-row { cursor: pointer; background: #fcfcfd; }
  table.t2 .op-row:hover { background: #f6f8fa; }
  table.t2 .op-row .opn { font-family: Consolas, monospace; color: #1e3a5f; font-weight: 600; }
  table.t2 .op-row .tw { color: #9ca3af; font-size: 11px; }
  table.t2 .op-row .caret { display: inline-block; width: 14px; color: #b6bcc4; transition: transform .15s; }
  table.t2 .op-row.open .caret { transform: rotate(90deg); }
  table.t2 .ch-row td { padding: 7px 12px 7px 40px; background: #fff; font-size: 12px; }
  table.t2 .ch-row .code { font-family: Consolas, monospace; color: #1e3a5f; font-size: 11px; margin-right: 6px; }
  table.t2 .ch-row .muted { color: #9ca3af; }
  table.t2 .ch-row .accent { color: #1e3a5f; }
  .ch-row.hide { display: none; }
</style>
</head>
<body>
  <div class="demo-topbar">检验批详情 — IL-2026-001234 <span class="sub">质量管理 / 检验批管理</span></div>
  <div class="demo-wrap">
    <div class="demo-head">
      <span class="bn">IL-2026-001234</span>
      <span class="meta">计划 <b class="mono">IP-2001</b></span>
      <span class="meta">进货检验</span>
      <span class="meta">上海工厂</span>
    </div>
    <div class="demo-tabs">
      <div class="t on">基本信息</div>
      <div class="t off">取样记录</div>
      <div class="t off">结果录入</div>
      <div class="t off">使用决策</div>
      <div class="t off">操作流水</div>
    </div>

    <div class="kv" id="baseKv"></div>

    <h3 class="sec-title" style="margin-top:22px;">检验工序清单 <span class="muted" style="font-weight:400;font-size:12px;">（来源：检验计划 IP-2001 · 点击工序展开特性）</span></h3>
    <table class="t2">
      <thead><tr><th style="width:230px;">工序</th><th style="width:160px;">类型</th><th>工作中心</th><th>关键信息</th></tr></thead>
      <tbody id="ops2"></tbody>
    </table>
  </div>

<script src="ib-demo-data.js"></script>
<script>
  const D = window.IB_DEMO, b = D.batch, ops = D.ops, esc = s => (s==null?'':String(s));
  document.getElementById('baseKv').innerHTML = `
    <div><span class="k">物料编码</span><span class="v mono">${esc(b.materialCode)}</span></div>
    <div><span class="k">物料名称</span><span class="v">${esc(b.materialName)}</span></div>
    <div><span class="k">数量</span><span class="v">${b.quantity} ${esc(b.unit)}</span></div>
    <div><span class="k">供应商批次</span><span class="v accent">${esc(b.supplierBatch)}</span></div>
    <div><span class="k">SAP批次</span><span class="v mono">${esc(b.sapBatch)}</span></div>
    <div><span class="k">凭证号</span><span class="v mono">${esc(b.docNo)}</span></div>`;

  let html = '';
  ops.forEach((op, i) => {
    const isSamp = op.opType === 'sampling';
    const key = isSamp ? `取样方案：${esc(op.samplingPlanName||'—')}` : `检测项：${op.chars.length}（定量 ${op.chars.filter(c=>c.micType==='quantitative').length} / 定性 ${op.chars.filter(c=>c.micType==='qualitative').length}）`;
    html += `<tr class="op-row" onclick="this.classList.toggle('open');document.getElementById('ch_${i}').classList.toggle('hide')">
      <td><span class="caret">▸</span><span class="opn">${esc(op.opNum)}</span></td>
      <td><span class="tw">${esc(op.opTypeName)}</span></td>
      <td>${esc(op.workCenterName)}</td>
      <td>${key}</td>
    </tr>`;
    if (!isSamp) {
      op.chars.forEach(c => {
        const isQ = c.micType==='quantitative';
        const spec = isQ ? `规格 <span class="accent">${esc(c.lowerSpec)} ~ ${esc(c.upperSpec)}</span> ${esc(c.unit)}` : `判定 <span class="accent">${esc(c.defaultCode||'—')}</span>${c.codeGroup?` · ${esc(c.codeGroup)}`:''}`;
        html += `<tr class="ch-row hide" id="ch_${i}">
          <td colspan="2"><span class="code">${esc(c.micCode)}</span>${esc(c.micName)}</td>
          <td class="muted">${esc(c.methodName||'—')}</td>
          <td>${spec}</td>
        </tr>`;
      });
    } else {
      html += `<tr class="ch-row hide" id="ch_${i}"><td colspan="4" class="muted">描述：${esc(op.description)}</td></tr>`;
    }
  });
  document.getElementById('ops2').innerHTML = html;
</script>
</body>
</html>
