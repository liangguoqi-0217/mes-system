<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>检验批·基本信息 - 风格4 克制卡片</title>
<link rel="stylesheet" href="ib-demo-base.css">
<style>
  /* 风格4：细边框卡片，去彩色，仅小号灰标 */
  .card4 { border: 1px solid #e8eaed; border-radius: 8px; padding: 14px 18px; margin-bottom: 12px; background: #fff; }
  .card4 .ch { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
  .card4 .ch .n { font-family: Consolas, monospace; color: #1e3a5f; font-weight: 600; font-size: 13px; }
  .card4 .ch .tag { font-size: 10.5px; letter-spacing: .6px; text-transform: uppercase; color: #9ca3af; border: 1px solid #eef0f2; border-radius: 3px; padding: 1px 6px; }
  .card4 .ch .wc { font-size: 12px; color: #6b7280; }
  .card4 .body { font-size: 12.5px; color: #374151; }
  .card4 .body .lab { color: #9ca3af; margin-right: 6px; }
  .card4 .body .accent { color: #1e3a5f; }
  .crows { margin-top: 10px; border-top: 1px solid #f1f2f4; }
  .crows .cr { display: grid; grid-template-columns: 1.5fr 1fr 1fr; gap: 0 18px; padding: 8px 0; border-bottom: 1px solid #f6f7f8; font-size: 12px; }
  .crows .cr:last-child { border-bottom: 0; }
  .crows .cr .nm { font-weight: 500; }
  .crows .cr .nm .code { font-family: Consolas, monospace; color: #1e3a5f; font-size: 11px; margin-right: 6px; }
  .crows .cr .m { color: #9ca3af; }
  .crows .cr .v { color: #374151; }
</style>
</head>
<body>
  <div class="demo-topbar">检验批详情 — IL-2026-001234 <span class="sub">质量管理 / 检验批管理</span></div>
  <div class="demo-wrap">
    <div class="demo-head">
      <span class="bn">IL-2026-001234</span>
      <span class="meta">计划 <b class="mono">IP-2001</b></span>
      <span class="meta">进货检验</span>
      <span class="meta">上海工厂</span>
    </div>
    <div class="demo-tabs">
      <div class="t on">基本信息</div>
      <div class="t off">取样记录</div>
      <div class="t off">结果录入</div>
      <div class="t off">使用决策</div>
      <div class="t off">操作流水</div>
    </div>

    <div class="kv" id="baseKv"></div>

    <h3 class="sec-title" style="margin-top:22px;">检验工序清单 <span class="muted" style="font-weight:400;font-size:12px;">（来源：检验计划 IP-2001）</span></h3>
    <div id="ops4"></div>
  </div>

<script src="ib-demo-data.js"></script>
<script>
  const D = window.IB_DEMO, b = D.batch, ops = D.ops, esc = s => (s==null?'':String(s));
  document.getElementById('baseKv').innerHTML = `
    <div><span class="k">物料编码</span><span class="v mono">${esc(b.materialCode)}</span></div>
    <div><span class="k">物料名称</span><span class="v">${esc(b.materialName)}</span></div>
    <div><span class="k">数量</span><span class="v">${b.quantity} ${esc(b.unit)}</span></div>
    <div><span class="k">供应商批次</span><span class="v accent">${esc(b.supplierBatch)}</span></div>
    <div><span class="k">SAP批次</span><span class="v mono">${esc(b.sapBatch)}</span></div>
    <div><span class="k">凭证号</span><span class="v mono">${esc(b.docNo)}</span></div>`;

  document.getElementById('ops4').innerHTML = ops.map(op => {
    const isSamp = op.opType === 'sampling';
    const head = `<div class="ch"><span class="n">${esc(op.opNum)}</span><span class="tag">${esc(op.opTypeName)}</span><span class="wc">${esc(op.workCenterName)}</span></div>`;
    const body = isSamp
      ? `<div class="body"><span class="lab">取样方案</span><span class="accent mono">${esc(op.samplingPlanName||'—')}</span><br><span class="lab">工序描述</span>${esc(op.description)}</div>`
      : `<div class="body"><span class="lab">检测项</span>${op.chars.length} 项（定量 ${op.chars.filter(c=>c.micType==='quantitative').length} / 定性 ${op.chars.filter(c=>c.micType==='qualitative').length}）｜ ${esc(op.description)}</div>
         <div class="crows">${op.chars.map(c => {
           const isQ = c.micType==='quantitative';
           const v = isQ ? `规格 <span class="accent">${esc(c.lowerSpec)} ~ ${esc(c.upperSpec)}</span> ${esc(c.unit)}` : `判定 <span class="accent">${esc(c.defaultCode||'—')}</span>${c.codeGroup?` · ${esc(c.codeGroup)}`:''}`;
           return `<div class="cr"><div class="nm"><span class="code">${esc(c.micCode)}</span>${esc(c.micName)}</div><div class="m">${esc(c.methodName||'—')}</div><div class="v">${v}</div></div>`;
         }).join('')}</div>`;
    return `<div class="card4">${head}${body}</div>`;
  }).join('');
</script>
</body>
</html>
